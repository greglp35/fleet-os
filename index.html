<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FleetOS Mobile — Live Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Mobile sombre & haute visibilité */
            --bg: #0d1117; --card: #161b22; --brd: #30363d;
            --accent: #f59e0b; --red: #f85149; --green: #2ea043; --blue: #58a6ff;
            --text: #c9d1d9; --dim: #8b949e; --active-bg: rgba(245,158,11,0.1);
            --font: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
            --h-nav: 60px; --h-filter: 50px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* --- HEADER MOBILE --- */
        header { 
            height: var(--h-nav); border-bottom: 1px solid var(--brd); 
            display: flex; align-items: center; padding: 0 16px; 
            justify-content: space-between; background: rgba(13,17,23,0.9); 
            backdrop-filter: blur(10px); z-index: 100; flex-shrink: 0;
        }
        .logo { font-family: var(--mono); font-weight: 800; font-size: 13px; letter-spacing: 1px; color: var(--accent); }
        .live-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); font-family: var(--mono); }
        .status-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

        /* --- LAYOUT & MAIN CONTENT --- */
        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        
        /* On masque la sidebar sur mobile */
        sidebar { display: none; }

        /* Zone de contenu scrollable */
        section { 
            flex: 1; overflow-y: auto; 
            padding: 16px 16px 80px 16px; /* Padding bottom pour l'espace */
            -webkit-overflow-scrolling: touch; /* Scroll fluide sur iOS */
        }
        
        /* Titre Mobile */
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 20px; font-weight: 800; }
        .page-header p { color: var(--dim); font-size: 12px; }

        /* --- FILTRES MOBILES (Onglets tactiles) --- */
        .mobile-filters {
            display: flex; gap: 8px; margin-bottom: 16px;
            overflow-x: auto; padding-bottom: 4px; /* Scroll horizontal si besoin */
            -webkit-overflow-scrolling: touch;
        }
        .filter-btn {
            flex: 1; min-width: 100px; text-align: center;
            padding: 10px; border-radius: 8px; background: var(--card);
            border: 1px solid var(--brd); color: var(--dim);
            font-size: 11px; font-family: var(--mono); font-weight: 600;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .filter-btn.active { background: var(--active-bg); color: var(--accent); border-color: rgba(245,158,11,0.3); }

        /* --- GRILLE DE VÉHICULES (Optimisée Mobile) --- */
        .grid { 
            display: flex; flex-direction: column; gap: 12px; 
        }
        
        /* --- CARTE VÉHICULE MOBILE --- */
        .v-card { 
            background: var(--card); border: 1px solid var(--brd); 
            border-radius: 10px; padding: 16px; 
            display: flex; flex-direction: column; gap: 12px;
            transition: 0.2s;
        }
        .v-card:active { background: rgba(255,255,255,0.03); transform: scale(0.98); } /* Effet tactile */
        
        /* Ligne du haut : Plaque & Badge */
        .v-row-top { display: flex; justify-content: space-between; align-items: center; }
        .plate { font-family: var(--mono); font-size: 10px; color: var(--accent); background: rgba(245,158,11,0.1); padding: 4px 8px; border-radius: 4px; }
        .v-name { font-size: 16px; font-weight: 700; color: var(--text); }
        
        /* Ligne des Jauges */
        .v-gauges { display: flex; gap: 12px; }
        .gauge-block { flex: 1; }
        .gauge-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 5px; font-family: var(--mono); }
        .gauge-bg { height: 3px; background: #21262d; border-radius: 2px; overflow: hidden; }
        .gauge-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease-in-out; }

        /* Badges d'état */
        .badge { font-family: var(--mono); font-size: 8px; padding: 3px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .b-urgent { background: rgba(248, 81, 73, 0.1); color: var(--red); border: 1px solid rgba(248, 81, 73, 0.3); }
        .b-ok { background: rgba(46, 160, 67, 0.1); color: var(--green); border: 1px solid rgba(46, 160, 67, 0.3); }

    </style>
</head>
<body>

<header>
    <div class="logo">GREG//LOGISTIC</div>
    <div class="live-status">
        <span class="status-dot"></span>
        <span id="clock">00:00:00</span>
    </div>
</header>

<div class="main-container">
    <section>
        <div class="page-header">
            <h1>Surveillance Flotte</h1>
            <p>Analyse des unités actives</p>
        </div>

        <div class="mobile-filters">
            <div class="filter-btn active" onclick="setFilter('all', this)">Tous (4)</div>
            <div class="filter-btn" onclick="setFilter('urgent', this)">Alertes (2)</div>
            <div class="filter-btn" onclick="setFilter('maintenance', this)">Atelier (0)</div>
        </div>

        <div class="grid" id="fleet-grid">
            </div>
    </section>
</div>

<script>
    // Données de la flotte
    const FLEET_DATA = [
        { id: 1, plate: "FR-101-RT", model: "Volvo FH16", fuel: 14, load: 92, status: "Urgent" },
        { id: 2, plate: "DE-404-NF", model: "Scania S650", fuel: 88, load: 45, status: "OK" },
        { id: 3, plate: "IT-202-PL", model: "Mercedes Actros", fuel: 42, load: 10, status: "OK" },
        { id: 4, plate: "ES-998-XX", model: "Renault T-High", fuel: 8, load: 98, status: "Urgent" }
    ];

    // Moteur de rendu optimisé pour mobile
    function renderFleet(filterType = 'all') {
        const grid = document.getElementById('fleet-grid');
        
        // Filtrage des données
        const filteredData = FLEET_DATA.filter(v => {
            if (filterType === 'all') return true;
            if (filterType === 'urgent') return v.status === 'Urgent';
            return false;
        });

        // Génération du HTML
        grid.innerHTML = filteredData.map(v => `
            <div class="v-card">
                <div class="v-row-top">
                    <div>
                        <div class="v-name">${v.model}</div>
                        <span class="plate">${v.plate}</span>
                    </div>
                    <span class="badge ${v.status === 'Urgent' ? 'b-urgent' : 'b-ok'}">${v.status}</span>
                </div>
                
                <div class="v-gauges">
                    <div class="gauge-block">
                        <div class="gauge-label"><span>FUEL</span><span>${v.fuel}%</span></div>
                        <div class="gauge-bg"><div class="gauge-fill" style="width: ${v.fuel}%; background: ${v.fuel < 20 ? 'var(--red)' : 'var(--green)'}"></div></div>
                    </div>
                    <div class="gauge-block">
                        <div class="gauge-label"><span>LOAD</span><span>${v.load}%</span></div>
                        <div class="gauge-bg"><div class="gauge-fill" style="width: ${v.load}%; background: var(--blue)"></div></div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Gestion de l'état des filtres
    function setFilter(type, btn) {
        // UI: Mise à jour des boutons
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Data: Rendu de la grille
        renderFleet(type);
    }

    // Horloge Live
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
    }, 1000);

    // Lancement Initial
    renderFleet();

</script>
</body>
</html>
